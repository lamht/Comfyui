worker_processes auto;
worker_rlimit_nofile 100000;

events {
    worker_connections 16384;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 15;
    keepalive_requests 10000;

    types_hash_max_size 2048;

    # ===== Upload =====
    client_max_body_size 100M;
    client_body_buffer_size 128k;

    # ===== Gzip =====
    gzip on;
    gzip_types text/plain application/json text/css application/javascript;
    gzip_min_length 1000;
    gzip_comp_level 5;

    # ===== Log tối ưu =====
    access_log /var/log/nginx/access.log buffer=32k flush=5s;

    # ===== Upstream (giữ connection) =====
    upstream comfy_backend {
        server 127.0.0.1:8188;
        keepalive 64;
    }

    # ==============================
    # SERVER COMFYUI
    # ==============================
    server {
        listen 8080;
        server_name _;

        # Timeout cho AI job (rất quan trọng)
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;

        location / {

            proxy_pass http://comfy_backend;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # ===== WebSocket (ComfyUI cần) =====
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # ===== Headers =====
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # ===== Upload streaming (QUAN TRỌNG) =====
            proxy_request_buffering off;

            # ===== Buffer tối ưu =====
            proxy_buffering on;
            proxy_buffers 16 32k;
            proxy_buffer_size 64k;
        }
    }
}
